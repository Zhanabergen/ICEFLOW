<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - AssetFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-900">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full space-y-8 bg-gray-800/50 backdrop-blur-lg rounded-2xl p-8 border border-gray-700">
            <div class="text-center">
                <div class="flex justify-center mb-4">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-3xl"></i>
                    </div>
                </div>
                <h2 class="text-3xl font-bold text-white">Добро пожаловать</h2>
                <p class="text-gray-400 mt-2">Войдите в свой аккаунт</p>
            </div>
            
            <form id="loginForm" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-300 mb-2">Email</label>
                        <input type="email" id="email" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Пароль</label>
                        <input type="password" id="password" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 bg-gray-700 border-gray-600 rounded">
                        <label class="ml-2 text-gray-400 text-sm">Запомнить меня</label>
                    </div>
                    <a href="#" class="text-purple-400 text-sm hover:underline">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                    Войти
                </button>
                
                <div class="text-center">
                    <p class="text-gray-400">Нет аккаунта? <a href="register.html" class="text-purple-400 hover:underline">Зарегистрироваться</a></p>
                </div>
                
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-gray-800 text-gray-400">Или войдите с помощью</span>
                    </div>
                </div>
                
                <button type="button" id="solanaLoginBtn" class="w-full bg-gray-700 text-white py-3 rounded-lg font-semibold hover:bg-gray-600 transition flex items-center justify-center gap-2">
                    <i class="fab fa-solana"></i> Войти через Solana Wallet
                </button>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
