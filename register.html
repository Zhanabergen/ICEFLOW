<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - AssetFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-900">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full space-y-8 bg-gray-800/50 backdrop-blur-lg rounded-2xl p-8 border border-gray-700">
            <div class="text-center">
                <div class="flex justify-center mb-4">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-3xl"></i>
                    </div>
                </div>
                <h2 class="text-3xl font-bold text-white">Создать аккаунт</h2>
                <p class="text-gray-400 mt-2">Начните инвестировать в токенизированные активы</p>
            </div>
            
            <form id="registerForm" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-300 mb-2">Имя пользователя</label>
                        <input type="text" id="username" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Email</label>
                        <input type="email" id="email" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Пароль</label>
                        <input type="password" id="password" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Подтверждение пароля</label>
                        <input type="password" id="confirmPassword" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Адрес Solana кошелька (опционально)</label>
                        <input type="text" id="walletAddress" placeholder="Введите адрес Phantom кошелька" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:border-purple-500">
                    </div>
                </div>
                
                <div class="flex items-center">
                    <input type="checkbox" id="terms" required class="w-4 h-4 bg-gray-700 border-gray-600 rounded">
                    <label class="ml-2 text-gray-400 text-sm">Я согласен с <a href="#" class="text-purple-400">условиями использования</a></label>
                </div>
                
                <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                    Зарегистрироваться
                </button>
                
                <div class="text-center">
                    <p class="text-gray-400">Уже есть аккаунт? <a href="login.html" class="text-purple-400 hover:underline">Войти</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
